<div class="container">
  <button mat-icon-button (click)="navigateToday()">
    <mat-icon>today</mat-icon>
  </button>
  <button mat-icon-button (click)="navigateForward()">
    <mat-icon>chevron_left</mat-icon>
  </button>
  <span>{{selectedDate$ |async | date}}</span>
  <button mat-icon-button (click)="navigateBackward()">
    <mat-icon>chevron_right</mat-icon>
  </button>
  <button mat-icon-button (click)="openDatePicker()">
    <mat-icon>calendar_month</mat-icon>
  </button>
</div>
